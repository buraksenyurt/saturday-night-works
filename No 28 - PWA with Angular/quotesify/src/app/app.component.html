<mat-toolbar>
  <mat-toolbar-row>
    <span>Some dummy posts from universe</span>
  </mat-toolbar-row>
</mat-toolbar>
<main>
  @if (posts$ | async; as posts) {
    @for (post of posts; track post.id) {
      <mat-card>
        <mat-card-header>
          <mat-card-title>{{ post.title }}</mat-card-title>
        </mat-card-header>
        <mat-card-content>
          {{ post.body }}
        </mat-card-content>
      </mat-card>
    }
  }
</main>
